name: Build

# When does this run?
on:
  push:
    branches: [main]        # every push to main -> sanity build
    tags: ['v*']            # a tag like v1.0.3 -> build AND publish a release
  pull_request:
    branches: [main]        # pull requests -> sanity build
  workflow_dispatch:        # a manual "Run workflow" button in the Actions tab

# Allow the workflow to create releases / upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest   # GitHub gives us a fresh Windows machine

    steps:
      # 1. Grab the repository contents.
      - name: Checkout
        uses: actions/checkout@v5

      # 2. Set up the MSVC (Visual Studio) C++ toolchain, x64.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 3. Compile the single C file into scopewalker.exe.
      - name: Compile
        shell: cmd
        run: >
          cl /nologo /O2 /W3 src\scopewalker.c src\core\draw.c
          /link gdi32.lib user32.lib dwmapi.lib advapi32.lib
          /subsystem:windows /out:scopewalker.exe

      # 4. Save the exe as a downloadable "artifact" of this run
      #    (handy to test a build without making a release).
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: scopewalker
          path: scopewalker.exe

      # 5. If this run was triggered by a version tag (v*),
      #    create/update the matching Release and attach the exe.
      - name: Attach exe to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: scopewalker.exe
